<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Chess</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="app">
      <header class="topbar">
        <div class="title">Chess</div>
        <div class="modes">
          <label class="mode">
            <input type="radio" name="mode" value="local" checked />
            2 players (local)
          </label>
          <label class="mode">
            <input type="radio" name="mode" value="ai" />
            Play vs AI
          </label>
        </div>

        <div id="aiControls" class="ai-controls" style="display:none;">
          <label>
            Your side:
            <select id="aiHumanColor">
              <option value="w" selected>White</option>
              <option value="b">Black</option>
            </select>
          </label>
          <label>
            Difficulty:
            <select id="aiDifficulty">
              <option value="easy">Easy</option>
              <option value="medium" selected>Medium</option>
              <option value="hard">Hard</option>
            </select>
          </label>
          <button id="aiNewGameBtn" class="btn">New game</button>
        </div>

        <button id="newGameBtn" class="btn">New game</button>
      </header>

      <main class="layout">
        <section class="board-area">
          <div id="board" class="board" aria-label="Chess board"></div>
          <div id="status" class="status" aria-live="polite"></div>
          <div id="promotionModal" class="modal" style="display:none;">
            <div class="modal-card">
              <div class="modal-title">Choose promotion</div>
              <div class="promo-row">
                <button class="promo-btn" data-prom="q">Q</button>
                <button class="promo-btn" data-prom="r">R</button>
                <button class="promo-btn" data-prom="b">B</button>
                <button class="promo-btn" data-prom="n">N</button>
              </div>
            </div>
          </div>
        </section>

        <aside class="side">
          <div class="card">
            <div class="card-title">Moves</div>
            <ol id="moveList" class="move-list"></ol>
          </div>
          <div class="card">
            <div class="card-title">How to play</div>
            <div class="help">
              Click a piece, then click a destination. Legal moves are highlighted.
              In AI mode, moves are made automatically for the engine side.
            </div>
          </div>
        </aside>
      </main>
    </div>

    <script type="module" src="app.js"></script>
  </body>
</html>
