name: Build Windows Executable

on:
  push:
    branches:
      - '**'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pygame chess pyinstaller

    - name: Download Stockfish
      run: |
        Invoke-WebRequest -Uri "https://github.com/official-stockfish/Stockfish/releases/latest/download/stockfish-windows-x86-64-avx2.zip" -OutFile "stockfish.zip"
        Expand-Archive -Path "stockfish.zip" -DestinationPath "stockfish_ext"
        New-Item -ItemType Directory -Force -Path "assets\engine"
        Copy-Item -Path "stockfish_ext\stockfish-windows-x86-64-avx2\stockfish-windows-x86-64-avx2.exe" -Destination "assets\engine\stockfish.exe"

    - name: Build with PyInstaller
      run: |
        pyinstaller --noconfirm --onefile --windowed --add-data "assets;assets/" --name "Chess" "main.py"

    - name: Create Release and Upload Asset
      uses: softprops/action-gh-release@v2
      if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
      with:
        tag_name: latest
        name: "Latest Windows Build"
        body: "Automated build of the Desktop Chess application."
        files: dist/Chess.exe
        make_latest: true
